name: Validate Submission

on:
  repository_dispatch:
    types: [validate-submission]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout validator scripts
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm' # Speeds up concurrent workflow cycles automatically

      - name: Install validator dependencies
        run: npm ci # Executed directly from project root where package.json & lockfile actually live

      - name: Clone submitted repo
        run: |
          REPO_URL="${{ github.event.client_payload.repo_url }}"
          
          # Strips any trailing whitespaces or trailing slashes natively
          REPO_URL=$(echo "$REPO_URL" | sed 's/\/*$//')
          
          # Flexible, secure Regex validation accommodating optional trailing ".git" configurations safely
          if [[ ! "$REPO_URL" =~ ^https://github\.com/[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+(\.git)?$ ]]; then
            echo "❌ Security/Format Guard: Invalid repository URL scheme provided: $REPO_URL"
            exit 1
          fi
          
          git clone --depth=1 "$REPO_URL" /tmp/submitted-repo
        env:
          GIT_TERMINAL_PROMPT: "0"

      - name: Run validator
        id: validator
        run: |
          # ALIGNMENT POINT: Execute utilizing parameters mapped precisely to index.js logic
          # We pass the targeted code directory or target asset file path via the '--path' parameter
          node index.js \
            --type "${{ github.event.client_payload.project_type }}" \
            --path "/tmp/submitted-repo" \
            --output "/tmp/result.json"

      - name: Send result to Supabase
        if: always() # Guarantees execution telemetry reports back even if validation checks crash
        run: |
          node .github/validator/send-result.js \
            --result-file "/tmp/result.json" \
            --submission-id "${{ github.event.client_payload.submission_id }}" \
            --username "${{ github.event.client_payload.github_username }}" \
            --project-type "${{ github.event.client_payload.project_type }}"
        env:
          SUPABASE_RESULT_URL: ${{ secrets.SUPABASE_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}

      - name: Cleanup workspace traces
        if: always()
        run: rm -rf /tmp/submitted-repo /tmp/result.json
