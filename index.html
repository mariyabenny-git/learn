<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Project Tasks — Learn by Building</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e1117;
      --surface: #161b22;
      --surface-hover: #1c222b;
      --border: #2a313b;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: rgba(88, 166, 255, 0.12);
      --green: #3fb950;
      --green-dim: rgba(63, 185, 80, 0.12);
      --yellow: #d29922;
      --yellow-dim: rgba(210, 153, 34, 0.12);
      --purple: #bc8cff;
      --purple-dim: rgba(188, 140, 255, 0.12);
      --red: #f85149;
      --red-dim: rgba(248, 81, 73, 0.12);
      --radius: 8px;
      --font: 'Outfit', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      padding: 3.5rem 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(88,166,255,0.04) 0%, transparent 100%);
    }
    .header__left { text-align: left; }
    .header__badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      margin-bottom: 1rem;
      letter-spacing: 0.5px;
    }
    .header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.5px;
    }
    .header p {
      color: var(--text-muted);
      max-width: 540px;
      font-size: 0.95rem;
    }
    .submit-btn-header {
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 600;
      background: var(--green);
      color: #0e1117;
      border: none;
      border-radius: var(--radius);
      padding: 0.55rem 1.25rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .submit-btn-header:hover { opacity: 0.88; }
    .submit-btn-header:active { transform: scale(0.98); }
    .submit-btn-header.hidden { display: none; }

    /* ── Container ── */
    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── Top Tabs ── */
    .top-tabs {
      display: flex;
      gap: 0.25rem;
      padding: 2rem 0 0;
      margin-bottom: 0;
    }
    .top-tab {
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: none;
      position: relative;
    }
    .top-tab.active {
      background: var(--surface);
      color: var(--green);
      border-color: var(--border);
    }
    .top-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: var(--surface);
    }
    .top-tab.disabled { opacity: 0.35; cursor: not-allowed; }
    .top-tab .coming-soon {
      font-family: var(--mono);
      font-size: 0.6rem;
      background: var(--yellow-dim);
      color: var(--yellow);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    /* ── Project Tabs ── */
    .project-tabs {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 0 0;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .project-tabs.hidden { display: none; }
    .project-tab {
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .project-tab:hover { border-color: var(--accent); color: var(--text); }
    .project-tab.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Level Content Panel ── */
    .level-panel {
      border: 1px solid var(--border);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      background: var(--surface);
      padding: 1.5rem;
      display: none;
    }
    .level-panel.active { display: block; }

    .coming-soon-panel {
      display: none;
      border: 1px solid var(--border);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      background: var(--surface);
      padding: 3rem 1.5rem;
      text-align: center;
    }
    .coming-soon-panel.active { display: block; }
    .coming-soon-panel .icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
    .coming-soon-panel h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }
    .coming-soon-panel p { color: var(--text-muted); font-size: 0.9rem; }

    .project { display: none; }
    .project.active { display: block; }

    .project__title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.25rem; }
    .project__desc { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

    .section-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.6rem;
      margin-top: 1.5rem;
    }
    .project > .section-label:first-of-type { margin-top: 0; }

    .folder {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .folder span { color: var(--text); }

    .schema {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
      color: var(--text-muted);
    }
    .schema .key { color: var(--accent); }
    .schema .str { color: var(--green); }
    .schema .num-val { color: var(--purple); }
    .schema .comment { color: #545d68; font-style: italic; }

    .checklist { list-style: none; margin-bottom: 1.5rem; }
    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.5rem 0;
      font-size: 0.88rem;
      border-bottom: 1px solid rgba(42, 49, 59, 0.5);
    }
    .checklist li:last-child { border-bottom: none; }
    .checklist .num {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      background: var(--accent-dim);
      min-width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .bonus {
      background: var(--purple-dim);
      border: 1px solid rgba(188, 140, 255, 0.2);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-top: 1.5rem;
    }
    .bonus__title {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    .bonus ul { list-style: none; font-size: 0.85rem; }
    .bonus li { padding: 0.2rem 0; color: var(--text-muted); }
    .bonus li::before { content: '★ '; color: var(--purple); }

    /* ── Info Panels (Tips, Actions) ── */
    .info-panels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 3rem;
    }
    .panel-box {
      padding: 1.25rem 1.5rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.01);
    }
    .panel-box.yellow-box { border-color: rgba(210, 153, 34, 0.3); background: rgba(210, 153, 34, 0.01); }
    .panel-box.red-box { border-color: rgba(248, 81, 73, 0.3); background: rgba(248, 81, 73, 0.01); }
    
    .panel-box__title {
      font-family: var(--mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    .panel-box.yellow-box .panel-box__title { color: var(--yellow); }
    .panel-box.red-box .panel-box__title { color: var(--red); }

    .panel-box ul { list-style: none; font-size: 0.85rem; color: var(--text-muted); }
    .panel-box li { padding: 0.35rem 0; position: relative; padding-left: 1.25rem; }
    .panel-box li::before {
      position: absolute;
      left: 0;
      font-weight: bold;
    }
    .panel-box.yellow-box li::before { content: '→'; color: var(--yellow); }
    .panel-box.red-box li::before { content: '✖'; color: var(--red); font-size: 0.75rem; top: 1px; }

    /* ── Leaderboard Styles ── */
    .lb-filters { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .lb-filter {
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .lb-filter:hover { border-color: var(--accent); color: var(--text); }
    .lb-filter.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .lb-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .lb-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .lb-table thead tr { border-bottom: 1px solid var(--border); background: var(--bg); }
    .lb-table th {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 0.65rem 1rem;
      text-align: left;
    }
    .lb-table td { padding: 0.7rem 1rem; border-bottom: 1px solid rgba(42, 49, 59, 0.5); vertical-align: middle; }
    .lb-table tbody tr:last-child td { border-bottom: none; }
    .lb-table tbody tr:hover { background: var(--surface-hover); }

    .rank-badge { font-family: var(--mono); font-size: 0.72rem; font-weight: 500; min-width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; }
    .rank-1 { background: rgba(210,153,34,0.2); color: #d29922; }
    .rank-2 { background: rgba(139,148,158,0.2); color: #8b949e; }
    .rank-3 { background: rgba(174,124,90,0.2); color: #ae7c5a; }
    .rank-other { background: var(--accent-dim); color: var(--accent); }

    .lb-username { font-family: var(--mono); font-size: 0.8rem; color: var(--text); }
    .lb-project { font-family: var(--mono); font-size: 0.68rem; padding: 0.15rem 0.5rem; border-radius: 20px; text-transform: capitalize; margin-right: 0.25rem; display: inline-block; }
    .lb-project.portfolio { background: var(--accent-dim); color: var(--accent); }
    .lb-project.recipe    { background: var(--green-dim);  color: var(--green);  }
    .lb-project.quiz      { background: var(--purple-dim); color: var(--purple); }

    .lb-score { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; }
    .score-bar-wrap { width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .score-bar { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .lb-date { font-family: var(--mono); font-size: 0.72rem; color: var(--text-muted); }

    .lb-state { padding: 2.5rem 1rem; text-align: center; color: var(--text-muted); font-size: 0.88rem; }
    .lb-state .icon { font-size: 1.8rem; margin-bottom: 0.5rem; }

    .lb-loading { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 2rem; color: var(--text-muted); font-size: 0.85rem; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal Layout ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 1rem; }
    .modal-overlay.visible { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; max-width: 480px; width: 100%; position: relative; animation: modalIn 0.2s ease; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .modal-close { position: absolute; top: 0.75rem; right: 0.75rem; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; line-height: 1; padding: 0.25rem; }
    .modal__title { font-size: 1
